<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="102" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="120" fill="#06b6d4" opacity="0.1"/>
  <circle cx="432" cy="432" r="150" fill="#a855f7" opacity="0.1"/>
  <circle cx="256" cy="256" r="200" fill="#ec4899" opacity="0.05"/>
  
  <!-- Logo Icon Box -->
  <g filter="url(#glow)" transform="translate(156, 100)">
    <rect width="200" height="200" rx="50" fill="url(#accentGradient)"/>
    <text x="100" y="145" text-anchor="middle" fill="white" font-size="120" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">7</text>
  </g>
  
  <!-- Brand Text -->
  <text x="256" y="380" text-anchor="middle" fill="white" font-size="56" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
    7zi
  </text>
  
  <!-- Tagline -->
  <text x="256" y="430" text-anchor="middle" fill="#94a3b8" font-size="28" font-family="system-ui, -apple-system, sans-serif">
    Studio
  </text>
</svg>